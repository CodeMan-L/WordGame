<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我掌握世界线</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <h1 class="game-title">我掌握世界线</h1>
            <div class="header-subtitle">WORLD LINE MASTER</div>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">当前时代</span>
                <span class="status-value era-value" id="current_era">远古</span>
            </div>
            <div class="status-item">
                <span class="status-label">腐化度</span>
                <span class="status-value corruption-value" id="corruption_level">0</span>
                <div class="corruption-bar">
                    <div class="corruption-bar-fill" id="corruption_bar_fill"></div>
                </div>
            </div>
            <div class="status-item time-stones-item">
                <span class="status-label">时间石</span>
                <span class="status-value stones-value" id="time_stones">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">世界线</span>
                <span class="status-value timeline-value" id="worldline">0.000000</span>
            </div>
            <div class="status-item">
                <span class="status-label">修为</span>
                <span class="status-value cultivation-value" id="cultivation_display">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">神性</span>
                <span class="status-value divinity-value" id="divinity_display">0</span>
            </div>
        </div>

        <div class="main-content">
            <!-- 顶部广告位 -->
            <div id="ad-slot-header" class="ad-slot ad-slot-header"></div>

            <div class="log-area">
                <header class="log-header">
                    <span class="log-title">事件日志</span>
                    <button class="clear-log-btn" onclick="clearLog()">清除</button>
                </header>
                <div id="event_log" class="event-log"></div>
                <!-- 日志区底部广告位 -->
                <div id="ad-slot-log" class="ad-slot ad-slot-inline"></div>
            </div>

            <div class="action-panel">
                <header class="action-header">时间操控终端</header>
                <div class="action-buttons">
                    <button class="action-btn btn-explore" onclick="explore()">探索</button>
                    <button class="action-btn btn-era" onclick="changeEraAction()">切换时代</button>
                    <button class="action-btn btn-status" onclick="showStatus()">查看状态</button>
                    <button class="action-btn btn-timeline" onclick="viewTimeline()">观测世界线</button>
                    <button class="action-btn btn-achievements" onclick="showAchievements()">成就</button>
                    <button class="action-btn btn-ascension" onclick="showAscensionPaths()">飞升之路</button>
                    <button class="action-btn btn-memory" onclick="exciseMemoryAction()">切除记忆</button>
                    <button class="action-btn btn-reset" onclick="resetGame()">重置时间线</button>
                </div>
                <!-- 侧边栏广告位 -->
                <div id="ad-slot-sidebar" class="ad-slot ad-slot-sidebar"></div>
            </div>
        </div>

        <!-- 底部广告位 -->
        <div id="ad-slot-footer" class="ad-slot ad-slot-footer"></div>

        <footer class="game-footer">
            © 2026 世界线管理局 | 时间是一条河流，而你是掌舵人
        </footer>
    </div>

    <div class="modal-overlay" id="modal_overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal_title"></h2>
                <button class="modal-close-btn" onclick="closeModal()">✕</button>
            </header>
            <div id="modal_body" class="modal-body"></div>
            <!-- 模态框广告位 -->
            <div id="ad-slot-modal" class="ad-slot ad-slot-modal"></div>
            <div class="modal-footer">
                <button class="modal-confirm-btn" onclick="closeModal()">确认</button>
            </div>
        </div>
    </div>

    <div id="red_button_container" class="red-button-container">
        <div class="red-button-warning">⚠ 警告：因果律已严重扭曲 ⚠</div>
        <button class="red-button" onclick="showRedButton()">因果熔断</button>
    </div>

    <script src="state.js"></script>
    <script src="textPool.js"></script>
    <script src="corruption.js"></script>
    <script src="achievements.js"></script>
    <script src="ads.js"></script>
    <script src="main.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            AdManager.init();
        });
    </script>
</body>
</html>
