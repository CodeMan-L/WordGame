<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我掌握世界线</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <h1 class="game-title">我掌握世界线</h1>
            <div class="header-subtitle">WORLD LINE MASTER</div>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">当前时代</span>
                <span class="status-value era-value" id="current_era">原始时代</span>
            </div>
            <div class="status-item">
                <span class="status-label">腐化度</span>
                <span class="status-value corruption-value" id="corruption_level">0%</span>
                <div class="status-bar-fill corruption-bar"></div>
            </div>
            <div class="status-item">
                <span class="status-label">时间石</span>
                <span class="status-value stone-value" id="time_stones">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">世界线</span>
                <span class="status-value timeline-value" id="worldline">Alpha-01</span>
            </div>
        </div>

        <div class="main-content">
            <div class="log-area">
                <div class="log-header">
                    <span>事件日志</span>
                    <button class="log-clear-btn" onclick="clearLog()">清除</button>
                </div>
                <div class="log-content" id="event_log">
                    <div class="log-entry system-log">欢迎来到世界线管理系统。时间的洪流在等待着你...</div>
                </div>
            </div>

            <div class="action-panel">
                <div class="panel-header">
                    <span>时间操控终端</span>
                </div>
                <div class="action-buttons">
                    <button class="action-btn explore-btn" onclick="explore()">
                        <span class="btn-icon"></span>
                        <span class="btn-text">探索</span>
                    </button>
                    <button class="action-btn era-btn" onclick="changeEra()">
                        <span class="btn-icon"></span>
                        <span class="btn-text">切换时代</span>
                    </button>
                    <button class="action-btn status-btn" onclick="showStatus()">
                        <span class="btn-icon"></span>
                        <span class="btn-text">查看状态</span>
                    </button>
                    <button class="action-btn timeline-btn" onclick="viewTimeline()">
                        <span class="btn-icon"></span>
                        <span class="btn-text">观测世界线</span>
                    </button>
                    <button class="action-btn reset-btn" onclick="resetGame()">
                        <span class="btn-icon"></span>
                        <span class="btn-text">重置时间线</span>
                    </button>
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <span class="footer-text"> 2026 世界线管理局 | 时间是一条河流，而你是掌舵人</span>
        </footer>
    </div>

    <div class="modal-overlay" id="modal_overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal_title">提示</span>
                <button class="modal-close" onclick="closeModal()"></button>
            </div>
            <div class="modal-body" id="modal_body"></div>
            <div class="modal-footer">
                <button class="modal-btn" onclick="closeModal()">确定</button>
            </div>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/textPool.js"></script>
    <script src="js/corruption.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
